name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Ruff
        run: ruff check .

      - name: Verificar checksums de datos raw
        run: python -m scripts.verificar_checksums --opcional
        continue-on-error: true

      - name: Pytest
        run: pytest
