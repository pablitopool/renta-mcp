# Comunidad de Madrid — IRPF tramo autonómico ejercicio 2024.
# Fuente: Decreto Legislativo 1/2010 CAM y sus modificaciones. Escala
# autonómica más baja de régimen común.

territorio:
  slug: madrid
  nombre: Comunidad de Madrid
  regimen: comun

año: 2024
fuente_boe: "BOCM consolidado DL 1/2010"
revisado_en: "2026-04-13"

# Escala autonómica (complemento de la estatal — la suma aproximada da el
# tipo total aplicable al contribuyente madrileño).
escala_autonomica:
  - { desde: 0,      hasta: 13362.22, tipo: 0.085 }
  - { desde: 13362.22, hasta: 19004.63, tipo: 0.107 }
  - { desde: 19004.63, hasta: 35425.68, tipo: 0.128 }
  - { desde: 35425.68, hasta: 57320.40, tipo: 0.174 }
  - { desde: 57320.40, hasta: null,   tipo: 0.205 }

# Madrid no aplica mínimos diferentes de los estatales.
minimos: {}

deducciones:
  - id: mad-nacimiento-adopcion
    categoria: familia
    titulo: "Deducción por nacimiento o adopción de hijos"
    importe_fijo: 600
    por_unidad: hijo
    requisitos:
      renta_maxima_individual: 30000
      renta_maxima_conjunta: 36000
    articulo: "Art. 11 DL 1/2010 CAM"

  - id: mad-familia-numerosa
    categoria: familia
    titulo: "Deducción por familia numerosa de categoría general o especial"
    porcentaje_cuota: 0.10
    limite_general: 6186.06
    limite_especial: 9279.09
    articulo: "Art. 11 bis DL 1/2010 CAM"

  - id: mad-gastos-educacion
    categoria: educacion
    titulo: "Gastos educativos"
    porcentaje_escolaridad: 0.15
    porcentaje_idiomas: 0.10
    porcentaje_uniformes: 0.05
    limite_por_hijo: 400
    articulo: "Art. 11 DL 1/2010 CAM"

  - id: mad-alquiler-jovenes
    categoria: vivienda
    titulo: "Arrendamiento de vivienda habitual para menores de 35 años"
    porcentaje: 0.30
    base_maxima: 1000
    requisitos:
      edad_maxima: 35
      renta_maxima_individual: 25620
    articulo: "Art. 8 DL 1/2010 CAM"

  - id: mad-donativos-fundaciones
    categoria: donativos
    titulo: "Donativos a fundaciones culturales y científicas"
    porcentaje: 0.15
    limite_base_liquidable: 0.10
    articulo: "Art. 11 ter DL 1/2010 CAM"
