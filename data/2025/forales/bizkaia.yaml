nota: |
  Régimen foral. Valores aproximados v0.1; verificar en BOB.
  Cobertura ampliada a 24 deducciones de campaña 2025 según portal oficial
  y guías de la DFB. Las reglas de cálculo siguen un modelado homogéneo del
  motor (porcentaje/base/límite/importe fijo) y no sustituyen la validación
  jurídica individual.

