# Comunidad de Madrid — IRPF tramo autonómico ejercicio 2025.
# Fuente: Decreto Legislativo 1/2010 CAM y sus modificaciones. Escala
# autonómica más baja de régimen común.

territorio:
  slug: madrid
  nombre: Comunidad de Madrid
  regimen: comun

año: 2025
fuente_boe: "BOCM consolidado DL 1/2010"
revisado_en: "2026-04-13"

# Escala autonómica (complemento de la estatal — la suma aproximada da el
# tipo total aplicable al contribuyente madrileño).
escala_autonomica:
  - { desde: 0,      hasta: 13362.22, tipo: 0.085 }
  - { desde: 13362.22, hasta: 19004.63, tipo: 0.107 }
  - { desde: 19004.63, hasta: 35425.68, tipo: 0.128 }
  - { desde: 35425.68, hasta: 57320.40, tipo: 0.174 }
  - { desde: 57320.40, hasta: null,   tipo: 0.205 }

# Madrid no aplica mínimos diferentes de los estatales.
minimos: {}

